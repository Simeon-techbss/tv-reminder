<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Reminder Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .header .subtitle {
            color: #666;
            font-size: 1.1em;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        
        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f093fb;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #e080e8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(240, 147, 251, 0.4);
        }
        
        .btn-danger {
            background: #ff6b6b;
            color: white;
            padding: 8px 12px;
            font-size: 0.9em;
        }
        
        .btn-danger:hover {
            background: #ee5a52;
        }
        
        .show-list {
            list-style: none;
        }
        
        .show-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 12px 12px 12px;
            background: #f8f9fa;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            gap: 10px;
        }
        
        .show-item span {
            color: #333;
            font-weight: 500;
            flex: 1;
        }
        
        .show-delete-btn {
            background: none;
            border: none;
            color: #999;
            font-size: 1.2em;
            cursor: pointer;
            padding: 4px 8px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .show-delete-btn:hover {
            color: #ff6b6b;
            transform: scale(1.2);
        }
        
        .show-actions {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }
        
        .show-info-btn {
            background: none;
            border: none;
            color: #667eea;
            font-size: 1.1em;
            cursor: pointer;
            padding: 4px 8px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .show-info-btn:hover {
            color: #5568d3;
            transform: scale(1.2);
        }
        
        .upcoming-list {
            list-style: none;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .upcoming-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            margin-bottom: 12px;
            border-left: 4px solid #764ba2;
        }
        
        .episode-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .episode-info {
            font-size: 0.9em;
            color: #666;
            margin: 3px 0;
        }
        
        .upcoming-empty {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .upcoming-empty svg {
            width: 60px;
            height: 60px;
            margin: 0 auto 15px;
            opacity: 0.5;
        }
        
        .status-message {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        
        .status-message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            display: block;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .config-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .config-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }
        
        .check-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .check-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .check-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        /* Confirmation Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-box {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        .modal-box h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .modal-box .typo {
            background: #ffe0e0;
            padding: 10px;
            border-radius: 6px;
            margin: 15px 0;
            font-size: 1.1em;
            color: #cc0000;
            font-weight: 600;
        }
        
        .modal-box .suggestion {
            background: #e0f0ff;
            padding: 10px;
            border-radius: 6px;
            margin: 15px 0;
            font-size: 1.1em;
            color: #0066cc;
            font-weight: 600;
        }
        
        .modal-box p {
            color: #666;
            margin: 10px 0;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .modal-btn-accept {
            background: #667eea;
            color: white;
        }
        
        .modal-btn-accept:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .modal-btn-decline {
            background: #f093fb;
            color: white;
        }
        
        .modal-btn-decline:hover {
            background: #e080e8;
            transform: translateY(-2px);
        }
        
        /* Details Modal */
        .details-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .details-modal.active {
            display: flex;
        }
        
        .details-box {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .details-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
            padding-bottom: 15px;
            margin: -30px -30px 20px -30px;
            padding: 20px 30px 15px 30px;
            background: white;
            border-bottom: 3px solid #667eea;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .details-header h2 {
            margin: 0;
            color: #333;
            font-size: 1.8em;
        }
        
        .details-close {
            background: none;
            border: none;
            font-size: 1.5em;
            color: #999;
            cursor: pointer;
            padding: 0;
            margin-left: 10px;
            flex-shrink: 0;
        }
        
        .details-close:hover {
            color: #333;
        }
        
        .detail-item {
            margin: 15px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            border-left: 3px solid #667eea;
        }
        
        .detail-label {
            font-weight: 600;
            color: #667eea;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        
        .detail-value {
            color: #333;
            line-height: 1.5;
        }
        
        .detail-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 5px;
        }
        
        .genre-tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.85em;
        }
        
        .detail-links {
            display: flex;
            gap: 10px;
            margin: 0 0 25px 0;
        }
        
        .detail-links a {
            display: inline-block;
            padding: 8px 15px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .detail-links a:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .detail-loading {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .detail-error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📺 TV Reminder</h1>
            <p class="subtitle">Manage your tracked shows and upcoming episodes</p>
        </div>
        
        <div class="main-content">
            <!-- Shows Management -->
            <div class="card">
                <h2>Shows to Track</h2>
                <div id="showsStatus" class="status-message"></div>
                
                <div class="form-group">
                    <label for="showInput">Add New Show:</label>
                    <div class="button-group">
                        <input type="text" id="showInput" placeholder="e.g., The Mandalorian" title="Enter show name">
                        <button class="btn-primary" onclick="addShow()" title="Add show to tracking list">Add</button>
                    </div>
                </div>
                
                <h3 style="color: #666; margin-top: 25px; margin-bottom: 15px;">Current Shows:</h3>
                <div id="showsList" class="loading">Loading shows...</div>
            </div>
            
            <!-- Configuration -->
            <div class="card">
                <h2>Configuration</h2>
                <div id="configStatus" class="status-message"></div>
                
                <div class="config-row">
                    <div class="form-group">
                        <label for="regionInput">Region:</label>
                        <select id="regionInput">
                            <option value="GB">United Kingdom (GB)</option>
                            <option value="US">United States (US)</option>
                            <option value="AU">Australia (AU)</option>
                            <option value="CA">Canada (CA)</option>
                            <option value="IE">Ireland (IE)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="daysInput">Days Ahead:</label>
                        <input type="number" id="daysInput" min="1" max="30" value="7">
                    </div>
                </div>
                
                <button class="btn-primary" onclick="updateConfig()">Save Configuration</button>
            </div>
            
            <!-- Upcoming Episodes -->
            <div class="card full-width">
                <h2>Upcoming Episodes</h2>
                <div id="upcomingStatus" class="status-message"></div>
                
                <div class="button-group" style="margin-bottom: 20px;">
                    <button class="btn-secondary" onclick="loadUpcoming()" title="Refresh upcoming episodes">Refresh List</button>
                    <button class="check-button" onclick="triggerCheck()" id="checkBtn" title="Check for new episodes and send reminders">🚀 Send Reminder Check Now</button>
                </div>
                
                <div id="upcomingList" class="upcoming-list">
                    <div class="loading">Loading upcoming episodes...</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Confirmation Modal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-box">
            <h3>📺 Show Name Issue</h3>
            <p>You typed:</p>
            <div class="typo" id="typoText"></div>
            <p>Did you mean:</p>
            <div class="suggestion" id="suggestionText"></div>
            <p style="font-size: 0.9em; color: #666; margin-top: 20px;">Or add it as-is?</p>
            <div class="modal-buttons">
                <button class="modal-btn-accept" onclick="confirmSuggestion()">✓ Fix to Suggestion</button>
                <button class="modal-btn-decline" onclick="addAsTyped()">✎ Add As-Is</button>
            </div>
        </div>
    </div>
    
    <!-- Details Modal -->
    <div class="details-modal" id="detailsModal">
        <div class="details-box">
            <div class="details-header">
                <h2 id="detailsTitle">Show Details</h2>
                <button class="details-close" onclick="closeDetails()">✕</button>
            </div>
            <div id="detailsContent" class="detail-loading">Loading...</div>
        </div>
    </div>
    
    <script>
        let pendingShow = null;
        
        function showConfirmModal(typo, suggestion) {
            pendingShow = {typo, suggestion};
            document.getElementById('typoText').textContent = `"${typo}"`;
            document.getElementById('suggestionText').textContent = `"${suggestion}"`;
            document.getElementById('confirmModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('confirmModal').classList.remove('active');
            pendingShow = null;
        }
        
        function confirmSuggestion() {
            if (!pendingShow) return;
            
            // Save the suggestion before closing the modal
            const suggestion = pendingShow.suggestion;
            closeModal();
            
            fetch('/api/shows', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: suggestion})
            })
            .then(r => {
                if (!r.ok && r.status !== 400) {
                    throw new Error(`HTTP ${r.status}`);
                }
                return r.json();
            })
            .then(d => {
                if (d.success) {
                    showStatus('showsStatus', `✓ Fixed to "${d.show}"`, 'success');
                    document.getElementById('showInput').value = '';
                    loadShows();
                    loadUpcoming();
                } else {
                    showStatus('showsStatus', d.error || 'Error adding show', 'error');
                }
            })
            .catch(e => {
                console.error('confirmSuggestion error:', e);
                showStatus('showsStatus', 'Error adding show: ' + e.message, 'error');
            });
        }
        
        function addAsTyped() {
            if (!pendingShow) return;
            
            // Save the typo before closing the modal
            const typo = pendingShow.typo;
            closeModal();
            
            fetch('/api/shows', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: typo, force: true})
            })
            .then(r => {
                if (!r.ok && r.status !== 400) {
                    throw new Error(`HTTP ${r.status}`);
                }
                return r.json();
            })
            .then(d => {
                if (d.success) {
                    showStatus('showsStatus', `Added "${d.show}"`, 'success');
                    document.getElementById('showInput').value = '';
                    loadShows();
                    loadUpcoming();
                } else {
                    showStatus('showsStatus', d.error || 'Error adding show', 'error');
                }
            })
            .catch(e => {
                console.error('addAsTyped error:', e);
                showStatus('showsStatus', 'Error adding show: ' + e.message, 'error');
            });
        }
        
        function showDetails(showName) {
            const modal = document.getElementById('detailsModal');
            const content = document.getElementById('detailsContent');
            const title = document.getElementById('detailsTitle');
            
            modal.classList.add('active');
            title.textContent = showName;
            content.innerHTML = '<div class="detail-loading">Loading details...</div>';
            
            fetch(`/api/shows/${encodeURIComponent(showName)}/details`)
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        content.innerHTML = `<div class="detail-error">❌ ${data.error}</div>`;
                        return;
                    }
                    
                    let html = '';
                    
                    // Links FIRST
                    if (data.tvmaze_url || data.imdb_url) {
                        html += `<div class="detail-links">`;
                        if (data.imdb_url) {
                            html += `<a href="${data.imdb_url}" target="_blank">🎬 View on IMDb</a>`;
                        }
                        if (data.tvmaze_url) {
                            html += `<a href="${data.tvmaze_url}" target="_blank">📺 Official Site</a>`;
                        }
                        html += `</div>`;
                    }
                    
                    // Description
                    if (data.description) {
                        html += `
                            <div class="detail-item">
                                <div class="detail-label">Description</div>
                                <div class="detail-value">${data.description}</div>
                            </div>
                        `;
                    }
                    
                    // Rating
                    if (data.rating && data.rating !== 'N/A') {
                        html += `
                            <div class="detail-item">
                                <div class="detail-label">Rating</div>
                                <div class="detail-value">⭐ ${data.rating} / 10</div>
                            </div>
                        `;
                    }
                    
                    // Status
                    if (data.status) {
                        html += `
                            <div class="detail-item">
                                <div class="detail-label">Status</div>
                                <div class="detail-value">${data.status}</div>
                            </div>
                        `;
                    }
                    
                    // Network
                    if (data.network) {
                        html += `
                            <div class="detail-item">
                                <div class="detail-label">Network / Platform</div>
                                <div class="detail-value">${data.network}</div>
                            </div>
                        `;
                    }
                    
                    // Air Year
                    if (data.year && data.year !== 'Unknown') {
                        html += `
                            <div class="detail-item">
                                <div class="detail-label">First Aired</div>
                                <div class="detail-value">${data.year}</div>
                            </div>
                        `;
                    }
                    
                    // Genres
                    if (data.genres && data.genres.length > 0) {
                        const genreTags = data.genres.map(g => `<span class="genre-tag">${g}</span>`).join('');
                        html += `
                            <div class="detail-item">
                                <div class="detail-label">Genres</div>
                                <div class="detail-genres">${genreTags}</div>
                            </div>
                        `;
                    }
                    
                    // Language
                    if (data.language && data.language !== 'Unknown') {
                        html += `
                            <div class="detail-item">
                                <div class="detail-label">Language</div>
                                <div class="detail-value">${data.language}</div>
                            </div>
                        `;
                    }

                    
                    content.innerHTML = html;
                })
                .catch(e => {
                    console.error('Show details error:', e);
                    content.innerHTML = `<div class="detail-error">Error loading details: ${e.message}</div>`;
                });
        }
        
        function closeDetails() {
            document.getElementById('detailsModal').classList.remove('active');
        }
        
        // Load shows on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadShows();
            loadConfig();
            loadUpcoming();
            // Auto-refresh upcoming every 5 minutes
            setInterval(loadUpcoming, 5 * 60 * 1000);
        });
        
        function showStatus(elementId, message, type) {
            const elem = document.getElementById(elementId);
            elem.textContent = message;
            elem.className = `status-message ${type}`;
            setTimeout(() => {
                elem.className = 'status-message';
            }, 5000);
        }
        
        function loadShows() {
            fetch('/api/shows')
                .then(r => r.json())
                .then(data => {
                    const list = document.getElementById('showsList');
                    if (!data.shows || data.shows.length === 0) {
                        list.innerHTML = '<p style="color: #999; text-align: center;">No shows tracked yet</p>';
                        return;
                    }
                    const html = `<ul class="show-list">${data.shows.map((show, idx) => `
                        <li class="show-item">
                            <span>${show}</span>
                            <div class="show-actions">
                                <button class="show-info-btn" onclick="showDetails('${show.replace(/'/g, "\\'")}');" title="View show details">ℹ️</button>
                                <button class="show-delete-btn" data-show="${show}" onclick="removeShow(this.getAttribute('data-show'))" title="Remove show">✕</button>
                            </div>
                        </li>
                    `).join('')}</ul>`;
                    list.innerHTML = html;
                })
                .catch(e => showStatus('showsStatus', 'Error loading shows', 'error'));
        }
        
        function loadConfig() {
            fetch('/api/config')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('regionInput').value = data.region;
                    document.getElementById('daysInput').value = data.days_ahead;
                })
                .catch(e => showStatus('configStatus', 'Error loading config', 'error'));
        }
        
        function loadUpcoming() {
            fetch('/api/upcoming')
                .then(r => r.json())
                .then(data => {
                    const list = document.getElementById('upcomingList');
                    if (data.error) {
                        list.innerHTML = `<p style="color: #cc0000;">${data.error}</p>`;
                        return;
                    }
                    if (!data.upcoming || data.upcoming.length === 0) {
                        list.innerHTML = '<div class="upcoming-empty"><div style="font-size: 3em;">✨</div><p>No upcoming episodes in the selected period</p></div>';
                        return;
                    }
                    const html = data.upcoming.map(ep => {
                        const epcode = (ep.season && ep.number) ? `S${String(ep.season).padStart(2, '0')}E${String(ep.number).padStart(2, '0')}` : 'Special';
                        const airdate = new Date(ep.airdate);
                        const today = new Date();
                        today.setHours(0, 0, 0, 0);
                        let dayStr = 'on ' + ep.airdate;
                        if (airdate.toDateString() === today.toDateString()) {
                            dayStr = 'Today';
                        } else if (airdate.getTime() === today.getTime() + 86400000) {
                            dayStr = 'Tomorrow';
                        }
                        let timeStr = ep.airtime ? ` at ${ep.airtime}` : '';
                        let networkStr = ep.network ? ` (${ep.network})` : '';
                        let urlStr = ep.url ? `<div class="episode-info"><a href="${ep.url}" target="_blank">View on TVMaze ↗</a></div>` : '';
                        return `
                            <div class="upcoming-item">
                                <div class="episode-title">${ep.show} ${epcode}</div>
                                <div class="episode-info">📅 ${dayStr}${timeStr}${networkStr}</div>
                                ${urlStr}
                            </div>
                        `;
                    }).join('');
                    list.innerHTML = html;
                })
                .catch(e => {
                    showStatus('upcomingStatus', 'Error loading upcoming episodes', 'error');
                });
        }
        
        function addShow() {
            const input = document.getElementById('showInput');
            const name = input.value.trim();
            if (!name) {
                showStatus('showsStatus', 'Please enter a show name', 'error');
                return;
            }
            fetch('/api/shows', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    let msg = data.corrected ? `✓ Fixed to "${data.show}"` : `✓ Added "${data.show}"`;
                    showStatus('showsStatus', msg, 'success');
                    input.value = '';
                    loadShows();
                    loadUpcoming();
                } else if (data.suggestions && data.suggestions.length > 0) {
                    // Show the modal with the suggestion
                    showConfirmModal(name, data.suggestions[0]);
                } else {
                    showStatus('showsStatus', data.error || 'Error adding show', 'error');
                }
            })
            .catch(e => showStatus('showsStatus', 'Error adding show', 'error'));
        }
        
        function removeShow(name) {
            if (!confirm(`Remove "${name}" from tracking?`)) return;
            fetch(`/api/shows/remove`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showStatus('showsStatus', `Removed "${name}"`, 'success');
                    loadShows();
                    loadUpcoming();
                } else {
                    showStatus('showsStatus', data.error || 'Error removing show', 'error');
                }
            })
            .catch(e => showStatus('showsStatus', 'Error removing show: ' + e.message, 'error'));
        }
        
        function updateConfig() {
            const region = document.getElementById('regionInput').value;
            const days_ahead = parseInt(document.getElementById('daysInput').value);
            fetch('/api/config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({region, days_ahead})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showStatus('configStatus', 'Configuration saved', 'success');
                    loadUpcoming();
                } else {
                    showStatus('configStatus', 'Error saving config', 'error');
                }
            })
            .catch(e => showStatus('configStatus', 'Error saving config', 'error'));
        }
        
        function triggerCheck() {
            const btn = document.getElementById('checkBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Checking...';
            
            fetch('/api/check', {method: 'POST'})
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showStatus('upcomingStatus', `✅ ${data.message}`, 'success');
                    loadUpcoming();
                } else {
                    showStatus('upcomingStatus', `❌ ${data.message || data.error}`, 'error');
                }
            })
            .catch(e => showStatus('upcomingStatus', 'Error triggering check', 'error'))
            .finally(() => {
                btn.disabled = false;
                btn.textContent = '🚀 Send Reminder Check Now';
            });
        }
    </script>
</body>
</html>
